http:
  - address: 0.0.0.0
    externalPort: 443
    hostnames:
      - "*"
    metadata:
      kind: Gateway
      name: gateway-1
      namespace: envoy-gateway
      sectionName: https
    name: envoy-gateway/gateway-1/https
    tls:
      certificates:
        - name: envoy-gateway/sds-listener-cert
          sds:
            secretName: default
            url: /var/run/secrets/workload-spiffe-uds/socket
    path:
      escapedSlashesAction: UnescapeAndRedirect
      mergeSlashes: true
    port: 10443
    routes:
      - destination:
          metadata:
            kind: HTTPRoute
            name: httproute-1
            namespace: envoy-gateway
          name: httproute/envoy-gateway/httproute-1/rule/0
          settings:
            - addressType: IP
              endpoints:
                - host: 10.244.0.11
                  port: 8080
              metadata:
                kind: Service
                name: service-1
                namespace: envoy-gateway
                sectionName: "8080"
              name: httproute/envoy-gateway/httproute-1/rule/0/backend/0
              protocol: HTTP
              weight: 1
        hostname: "*"
        isHTTP2: false
        metadata:
          kind: HTTPRoute
          name: httproute-1
          namespace: envoy-gateway
        name: httproute/envoy-gateway/httproute-1/rule/0/match/0/*
        pathMatch:
          distinct: false
          exact: /exact
          name: ""
