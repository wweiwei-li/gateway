- ignorePortInHostMatching: true
  name: envoy-gateway/gateway-1/https
  virtualHosts:
  - domains:
    - '*'
    metadata:
      filterMetadata:
        envoy-gateway:
          resources:
          - kind: Gateway
            name: gateway-1
            namespace: envoy-gateway
            sectionName: https
    name: envoy-gateway/gateway-1/https/*
    routes:
    - match:
        path: /exact
      metadata:
        filterMetadata:
          envoy-gateway:
            resources:
            - kind: HTTPRoute
              name: httproute-1
              namespace: envoy-gateway
      name: httproute/envoy-gateway/httproute-1/rule/0/match/0/*
      route:
        cluster: httproute/envoy-gateway/httproute-1/rule/0
        upgradeConfigs:
        - upgradeType: websocket
