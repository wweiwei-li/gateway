- circuitBreakers:
    thresholds:
    - maxRetries: 1024
  commonLbConfig: {}
  connectTimeout: 10s
  dnsLookupFamily: V4_PREFERRED
  edsClusterConfig:
    edsConfig:
      ads: {}
      resourceApiVersion: V3
    serviceName: httproute/envoy-gateway/httproute-1/rule/0
  ignoreHealthOnHostRemoval: true
  loadBalancingPolicy:
    policies:
    - typedExtensionConfig:
        name: envoy.load_balancing_policies.least_request
        typedConfig:
          '@type': type.googleapis.com/envoy.extensions.load_balancing_policies.least_request.v3.LeastRequest
          localityLbConfig:
            localityWeightedLbConfig: {}
  metadata:
    filterMetadata:
      envoy-gateway:
        resources:
        - kind: HTTPRoute
          name: httproute-1
          namespace: envoy-gateway
  name: httproute/envoy-gateway/httproute-1/rule/0
  perConnectionBufferLimitBytes: 32768
  type: EDS
- connectTimeout: 10s
  http2ProtocolOptions: {}
  loadAssignment:
    clusterName: sds_var_run_secrets_workload-spiffe-uds_socket
    endpoints:
    - lbEndpoints:
      - endpoint:
          address:
            pipe:
              path: /var/run/secrets/workload-spiffe-uds/socket
  name: sds_var_run_secrets_workload-spiffe-uds_socket
  type: STATIC
